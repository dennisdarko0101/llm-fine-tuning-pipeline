name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Security check - scan for secrets
        run: |
          # Check for common secret patterns in tracked files
          if git grep -lE '(AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{48}|password\s*=\s*["\x27][^"\x27]+["\x27])' -- ':(exclude)*.yml' ':(exclude)*.yaml' ':(exclude)*.md' 2>/dev/null; then
            echo "::error::Potential secrets detected in source files"
            exit 1
          fi
          echo "No secrets detected"
